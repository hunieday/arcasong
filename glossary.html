<script src="script.js">document.addEventListener("DOMContentLoaded", () => {
    const fadeElements = document.querySelectorAll(".scroll-fade");

    const observerOptions = {
        root: null,         // Uses the screen viewport
        threshold: 0.15,    // Triggers when 15% of the element is visible
        rootMargin: "0px"   // No extra clipping boundaries
    };

    const scrollObserver = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                // Add the appear class to kick off the CSS animation
                entry.target.classList.add("appear");
                // Stop observing this element so the animation only happens once
                observer.unobserve(entry.target);
            }
        });
    }, observerOptions);

    // Tell the observer to watch all your hidden elements
    fadeElements.forEach(element => {
        scrollObserver.observe(element);
    });
});</script>
